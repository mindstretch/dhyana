<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dhyana — Where are you right now?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0E1219;
  --text-1: rgba(255,255,255,0.88);
  --text-2: rgba(255,255,255,0.52);
  --text-3: rgba(255,255,255,0.28);
  --restful: #E8A855;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  height: -webkit-fill-available;
}

body {
  min-height: 100%;
  min-height: -webkit-fill-available;
  background: var(--bg);
  color: var(--text-1);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
  overscroll-behavior-y: contain;
  touch-action: pan-y;
  -webkit-tap-highlight-color: transparent;
}

/* Orb needs full touch control — override body pan-y */
.orb-container {
  touch-action: none;
}

/* ── PORTRAIT (mobile-first) ────────────────────────── */
.screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between; /* wordmark top, form bottom, orb fills middle */
  /* safe area insets for notched phones */
  padding: 24px 20px max(24px, env(safe-area-inset-bottom)) 20px;
  padding-top: max(24px, env(safe-area-inset-top));
  gap: 0;
}

/* Desktop: restore flex centering */
@media (min-width: 768px) {
  .screen {
    justify-content: flex-start;
    padding: 28px 48px 40px;
  }
}

/* ── LANDSCAPE — side-by-side layout ────────────────── */
@media (orientation: landscape) and (max-height: 600px) {
  .screen {
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: max(12px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
    min-height: 100dvh;
    overflow-y: auto;
  }

  .wordmark { display: none; }

  .orb-zone {
    flex: 0 0 auto;
    width: auto;
    gap: 8px;
  }

  .bottom-zone {
    flex: 1;
    max-width: 300px;
    align-items: flex-start;
    text-align: left;
  }

  .reveal-line { text-align: left; }
  .form-note   { text-align: left; }
  .footer-line { text-align: left; }

  .prompt {
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }

  .state-reveal { margin-top: 8px; }
  .hint { height: 32px; font-size: 11px; margin-top: 4px; }
}

.wordmark {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-2);
  letter-spacing: 0.02em;
  align-self: center;
  margin-bottom: 20px;
  flex-shrink: 0;
}

/* ── ORB ZONE ─────────────────────────────────────── */
.orb-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  /* Mobile: don't flex-grow — let the layout pack top-to-bottom
     so the bottom-zone (form) is always visible without scrolling */
  flex: 0 0 auto;
  justify-content: center;
  width: 100%;
  /* Push orb zone content to center but only take needed space */
  padding: 8px 0 0;
}

/* Desktop: orb zone can expand to fill available space */
@media (min-width: 768px) {
  .orb-zone {
    flex: 1;
    padding: 0;
  }
}

.prompt {
  font-size: 20px;
  font-weight: 300;
  color: var(--text-1);
  text-align: center;
  line-height: 1.4;
  letter-spacing: -0.01em;
  margin-bottom: 28px;
  transition: opacity 0.5s ease;
  flex-shrink: 0;
}
.prompt em {
  font-style: italic;
  color: var(--text-2);
}

/* ── ORB CONTAINER ───────────────────────────────── */
/*
  Sizing strategy (mobile-first):
  - Portrait phone: bound by viewport width (leave ~20% padding each side) and height
  - On very tall phones the height constraint kicks in to leave room for the form
  - Desktop: capped at 300px
*/
.orb-container {
  position: relative;
  --orb-size: min(260px, 58vw, 44vh);
  width: var(--orb-size);
  height: var(--orb-size);
  /* Extra breathing room for axis labels — they now live INSIDE */
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
  overflow: visible;
}

/* Desktop: restore the original feel */
@media (min-width: 768px) {
  .orb-container {
    --orb-size: min(300px, 40vw, 42vh);
  }
  .prompt { margin-bottom: 36px; }
  .wordmark { margin-bottom: 28px; }
}

/* Ambient outer glow — breathes slowly */
.orb-glow {
  position: absolute;
  inset: -32px;
  border-radius: 50%;
  background: radial-gradient(circle at center, rgba(111,168,154,0.08) 0%, transparent 70%);
  filter: blur(20px);
  transition: background 1.4s ease;
  pointer-events: none;
  animation: orb-glow-breathe 6s ease-in-out infinite;
}
@keyframes orb-glow-breathe {
  0%, 100% { opacity: 0.7; transform: scale(1);    }
  50%       { opacity: 1.0; transform: scale(1.06); }
}

/* The orb itself */
.orb {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(ellipse 80% 80% at 70% 28%,  rgba(232,168,85,0.85)  0%, transparent 52%),
    radial-gradient(ellipse 72% 72% at 24% 26%,  rgba(201,107,90,0.72)  0%, transparent 52%),
    radial-gradient(ellipse 70% 70% at 22% 76%,  rgba(90,110,138,0.80)  0%, transparent 52%),
    radial-gradient(ellipse 68% 68% at 76% 78%,  rgba(122,104,128,0.68) 0%, transparent 52%),
    radial-gradient(circle at 50% 50%,            rgba(111,168,154,0.55) 0%, transparent 60%),
    radial-gradient(circle at 50% 50%,            #131b26 0%, #0e1219 100%);
  cursor: crosshair;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 20px 56px rgba(0,0,0,0.5);
  /* Ambient pulse: very slow scale breath */
  animation: orb-breathe 7s ease-in-out infinite;
}
@keyframes orb-breathe {
  0%, 100% { transform: scale(1);     }
  50%       { transform: scale(1.022); }
}

/* Inner specular shimmer — the "something alive under the surface" layer */
.orb::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(ellipse 40% 28% at 62% 22%, rgba(255,255,255,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 22% 18% at 38% 68%, rgba(255,255,255,0.04) 0%, transparent 60%);
  animation: orb-shimmer 9s ease-in-out infinite;
  pointer-events: none;
}
@keyframes orb-shimmer {
  0%   { opacity: 0.6; transform: translateX(0)    translateY(0); }
  30%  { opacity: 1.0; transform: translateX(3px)  translateY(-2px); }
  65%  { opacity: 0.7; transform: translateX(-2px) translateY(3px); }
  100% { opacity: 0.6; transform: translateX(0)    translateY(0); }
}

/* Edge vignette */
.orb::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(14,18,25,0.55) 100%);
  pointer-events: none;
}

/* Canvas ripple overlay — sits on top of orb, same dimensions */
#rippleCanvas {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  overflow: hidden;
}

/* ── AXIS LABELS ─────────────────────────────────── */
/*
  Elegant solution: labels live just inside the orb edge at all sizes.
  No overflow. No clipping. No breakpoint hacks.
  Inset from the orb edge by ~12px so they're readable but don't
  obscure the center interaction zone.
*/
.axis-label {
  position: absolute;
  font-size: 9px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.32);
  pointer-events: none;
  white-space: nowrap;
  z-index: 2;
}
/* Top/bottom: inside top/bottom edge, horizontally centered */
.axis-label.top    {
  top: 14%;
  left: 50%;
  transform: translateX(-50%);
}
.axis-label.bottom {
  bottom: 14%;
  left: 50%;
  transform: translateX(-50%);
}
/* Left/right: inside left/right edge, vertically centered */
.axis-label.left   {
  left: 9%;
  top: 50%;
  transform: translateY(-50%);
  text-align: left;
}
.axis-label.right  {
  right: 9%;
  top: 50%;
  transform: translateY(-50%);
  text-align: right;
}

/* Desktop: labels can live outside the orb — more breathing room */
@media (min-width: 768px) {
  .axis-label { font-size: 10px; letter-spacing: 0.14em; color: rgba(255,255,255,0.36); }
  .axis-label.top    { top: -26px;    left: 50%; transform: translateX(-50%); }
  .axis-label.bottom { bottom: -26px; left: 50%; transform: translateX(-50%); }
  .axis-label.left   { left: -68px;   top: 50%;  transform: translateY(-50%); text-align: right; }
  .axis-label.right  { right: -68px;  top: 50%;  transform: translateY(-50%); }
}

/* Indicator — the drop landing in water */
.indicator {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px);
  transform: translate(-50%, -50%) scale(0.4);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 10px rgba(255,255,255,0.25), 0 0 3px rgba(255,255,255,0.5);
}
.indicator.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ── STATE REVEAL ─────────────────────────────────── */
.state-reveal {
  height: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  margin-top: 20px;
}

@media (min-width: 768px) {
  .state-reveal { height: 64px; margin-top: 48px; }
}

.state-name {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.01em;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.5s ease, transform 0.5s ease, color 0.5s ease;
}
.state-name.visible { opacity: 1; transform: translateY(0); }

.state-desc {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-2);
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
}
.state-desc.visible { opacity: 1; transform: translateY(0); }

/* hint */
.hint {
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.04em;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease;
  margin-top: 8px;
  flex-shrink: 0;
}
.hint.hidden { opacity: 0; pointer-events: none; }

@media (min-width: 768px) {
  .hint { height: 64px; margin-top: 16px; }
}

/* ── BOTTOM ZONE ──────────────────────────────────── */
.bottom-zone {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  padding-top: 12px;
}

@media (min-width: 768px) {
  .bottom-zone { padding-top: 0; }
}

.reveal-line {
  font-size: 14px;
  font-weight: 300;
  color: var(--text-2);
  text-align: center;
  line-height: 1.55;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  margin-bottom: 16px;
  max-width: 300px;
}
.reveal-line strong { color: var(--text-1); font-weight: 400; }
.reveal-line.visible { opacity: 1; transform: translateY(0); }

@media (min-width: 768px) {
  .reveal-line { font-size: 15px; margin-bottom: 24px; max-width: 320px; }
}

.form-wrap {
  width: 100%;
  max-width: 340px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
}
.form-wrap.visible { opacity: 1; transform: translateY(0); }

.form-row {
  display: flex;
  width: 100%;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 6px 6px 6px 20px;
  transition: border-color 0.2s;
}
.form-row:focus-within { border-color: rgba(232,168,85,0.3); }

.form-row input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-1);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  min-width: 0;
}
.form-row input::placeholder { color: var(--text-3); }

.form-btn {
  flex-shrink: 0;
  background: var(--restful);
  color: #0E1219;
  border: none;
  border-radius: 100px;
  padding: 10px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.15s;
}
.form-btn:hover  { opacity: 0.88; }
.form-btn:active { transform: scale(0.97); }

.form-note {
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
  margin-top: 10px;
  letter-spacing: 0.02em;
}

.form-success {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
  animation: fade-up 0.5s ease forwards;
}
.success-mark {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--restful);
  display: flex; align-items: center; justify-content: center;
  color: var(--restful);
  font-size: 16px;
  margin-bottom: 4px;
}
.success-title {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-1);
}
.success-sub {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 300;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.footer-line {
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.04em;
  margin-top: 20px;
  text-align: center;
}

@media (min-width: 768px) {
  .footer-line { margin-top: 32px; }
}
</style>
</head>
<body>
<div class="screen">

  <div class="wordmark">Dhyana</div>

  <div class="orb-zone">
    <p class="prompt" id="prompt">Where are you<br><em>right now?</em></p>

    <div class="orb-container" id="orbContainer">
      <div class="orb-glow" id="orbGlow"></div>
      <div class="orb" id="orb">
        <canvas id="rippleCanvas"></canvas>
      </div>
      <div class="indicator" id="indicator"></div>
      <span class="axis-label top">energized</span>
      <span class="axis-label bottom">depleted</span>
      <span class="axis-label left">stressed</span>
      <span class="axis-label right">regulated</span>
    </div>

    <div class="hint" id="hint">touch to place yourself</div>
    <div class="state-reveal" id="stateReveal" style="display:none;">
      <div class="state-name" id="stateName"></div>
      <div class="state-desc" id="stateDesc"></div>
    </div>
  </div>

  <div class="bottom-zone">
    <p class="reveal-line" id="revealLine">
      <strong>Dhyana would know exactly what to do next.</strong><br>
      Be first when it's ready.
    </p>

    <div class="form-wrap" id="formWrap">
      <div class="form-row" id="formRow">
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
        <button class="form-btn" id="submitBtn">Join waitlist</button>
      </div>
      <p class="form-note">Early access · No spam · Unsubscribe anytime</p>
      <div class="form-success" id="formSuccess">
        <div class="success-mark">✓</div>
        <p class="success-title">You're on the list.</p>
        <p class="success-sub">We'll find you when it's ready.</p>
      </div>
    </div>

    <p class="footer-line">dhyanaflow.com · © 2026</p>
  </div>

</div>

<script>
/* ─────────────────────────────────────────────────────────
   STATE MAP
───────────────────────────────────────────────────────── */
const STATES = {
  restful:   { name: 'Restful Alertness', desc: 'Calm and clear. Fully present. Ready.',    color: '#E8A855', glow: 'rgba(232,168,85,0.18)'  },
  regulated: { name: 'Regulated',         desc: 'Steady. Functioning well.',                 color: '#6FA89A', glow: 'rgba(111,168,154,0.14)' },
  activated: { name: 'Activated',         desc: 'Running hot. Stressed or over-driven.',     color: '#C96B5A', glow: 'rgba(201,107,90,0.16)'  },
  depleted:  { name: 'Depleted',          desc: 'Running on empty. Heavy. Hard to start.',   color: '#5A6E8A', glow: 'rgba(90,110,138,0.15)'  },
  dysreg:    { name: 'Dysregulated',      desc: 'Scattered. Mixed signals. Needs a reset.',  color: '#7A6880', glow: 'rgba(122,104,128,0.15)' },
};

function classify(nx, ny) {
  const d = Math.sqrt(nx*nx + ny*ny);
  if (d < 0.28) return 'regulated';
  if (ny >  0.15 && nx >  0.1)  return 'restful';
  if (ny >  0.15 && nx < -0.1)  return 'activated';
  if (ny < -0.15 && nx <  0)    return 'depleted';
  if (ny < -0.15 && nx >  0)    return 'dysreg';
  if (nx >  0.5  && Math.abs(ny) < 0.3) return 'regulated';
  if (nx < -0.5  && Math.abs(ny) < 0.3) return 'activated';
  return 'regulated';
}

/* ─────────────────────────────────────────────────────────
   CANVAS RIPPLE ENGINE
   Water-drop physics: multiple concentric rings with
   exponential decay, opacity falloff, slight color tint
───────────────────────────────────────────────────────── */
const canvas  = document.getElementById('rippleCanvas');
const ctx     = canvas.getContext('2d');
let ripples   = [];
let rafId     = null;

function resizeCanvas() {
  const orb = document.getElementById('orb');
  const r   = orb.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

// Each ripple: { x, y, t, maxR, color }
// t = elapsed ms since spawn
function spawnRipple(px, py, color) {
  // Convert percentage to px coords on the canvas
  const r = canvas.getBoundingClientRect();
  const x = px * r.width;
  const y = py * r.height;
  ripples.push({ x, y, born: performance.now(), color });
}

function drawRipples(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const orbR  = canvas.width / 2;  // orb radius in px
  const maxR  = orbR * 1.0;        // ripples max out at orb edge
  const dur   = 1400;              // ms for one full expansion

  ripples = ripples.filter(rip => {
    const t     = now - rip.born;
    if (t > dur) return false;

    const prog  = t / dur;          // 0→1

    // Draw 3 concentric rings per touch, staggered in time
    for (let i = 0; i < 3; i++) {
      const delay  = i * 0.18;
      const p      = Math.max(0, prog - delay);
      if (p <= 0) continue;

      const radius = p * maxR;
      // opacity: rises fast, then falls
      const alpha  = Math.max(0, (1 - p) * (1 - delay) * 0.45);

      ctx.beginPath();
      ctx.arc(rip.x, rip.y, radius, 0, Math.PI * 2);
      ctx.strokeStyle = rip.color
        ? hexToRgba(rip.color, alpha)
        : `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1.2 - i * 0.25;
      ctx.stroke();
    }

    return true;
  });

  if (ripples.length > 0) {
    rafId = requestAnimationFrame(t => drawRipples(t));
  } else {
    rafId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ─────────────────────────────────────────────────────────
   INTERACTION
───────────────────────────────────────────────────────── */
const orbEl     = document.getElementById('orb');
const orbGlow   = document.getElementById('orbGlow');
const indicator = document.getElementById('indicator');
const stateName = document.getElementById('stateName');
const stateDesc = document.getElementById('stateDesc');
const hint      = document.getElementById('hint');
const stateReveal = document.getElementById('stateReveal');
const revealLine  = document.getElementById('revealLine');
const formWrap    = document.getElementById('formWrap');

let placed       = false;
let currentState = null;

function getCenter() {
  const r = orbEl.getBoundingClientRect();
  return { cx: r.left + r.width/2, cy: r.top + r.height/2, radius: r.width/2 };
}

function onPlace(clientX, clientY) {
  const { cx, cy, radius } = getCenter();
  const dx = clientX - cx;
  const dy = clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  let x = clientX, y = clientY;
  if (dist > radius) {
    x = cx + (dx / dist) * radius;
    y = cy + (dy / dist) * radius;
  }

  const r   = orbEl.getBoundingClientRect();
  const px  = (x - r.left) / r.width;
  const py  = (y - r.top)  / r.height;
  const nx  = (px - 0.5) * 2;
  const ny  = -(py - 0.5) * 2;

  const key   = classify(nx, ny);
  currentState = key;
  const state = STATES[key];

  // Move indicator (spring animation via CSS cubic-bezier)
  indicator.style.left = `${px * 100}%`;
  indicator.style.top  = `${py * 100}%`;
  indicator.classList.add('visible');

  // Canvas ripple — color-tinted to the state
  resizeCanvas();
  spawnRipple(px, py, state.color);
  if (!rafId) rafId = requestAnimationFrame(t => drawRipples(t));

  // Glow shift
  orbGlow.style.background = `radial-gradient(circle at center, ${state.glow} 0%, transparent 70%)`;

  // State name
  stateName.style.color = state.color;
  stateName.textContent  = state.name;
  stateDesc.textContent  = state.desc;

  if (!placed) {
    placed = true;

    hint.classList.add('hidden');
    setTimeout(() => {
      hint.style.display = 'none';
      stateReveal.style.display = 'flex';
      setTimeout(() => {
        stateName.classList.add('visible');
        stateDesc.classList.add('visible');
      }, 40);
    }, 400);

    setTimeout(() => {
      revealLine.classList.add('visible');
      formWrap.classList.add('visible');
    }, 700);

  } else {
    stateName.classList.remove('visible');
    stateDesc.classList.remove('visible');
    requestAnimationFrame(() => setTimeout(() => {
      stateName.classList.add('visible');
      stateDesc.classList.add('visible');
    }, 40));
  }
}

// Touch
orbEl.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; onPlace(t.clientX,t.clientY); }, {passive:false});
orbEl.addEventListener('touchmove',  e => { e.preventDefault(); const t=e.touches[0]; onPlace(t.clientX,t.clientY); }, {passive:false});

// Mouse
let md = false;
orbEl.addEventListener('mousedown', e => { md=true; onPlace(e.clientX,e.clientY); });
window.addEventListener('mousemove', e => { if(md) onPlace(e.clientX,e.clientY); });
window.addEventListener('mouseup',   () => { md=false; });
orbEl.addEventListener('click', e => onPlace(e.clientX,e.clientY));

// Resize
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/* ─────────────────────────────────────────────────────────
   FORM
───────────────────────────────────────────────────────── */
document.getElementById('submitBtn').addEventListener('click', submit);
document.getElementById('emailInput').addEventListener('keydown', e => { if(e.key==='Enter') submit(); });

async function submit() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailInput').focus();
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '...';
  btn.disabled = true;

  try {
    await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, state: currentState })
    });
  } catch(err) {
    console.error(err);
  }

  document.getElementById('formRow').style.display = 'none';
  document.querySelector('.form-note').style.display = 'none';
  document.getElementById('formSuccess').style.display = 'flex';
}
</script>
</body>
